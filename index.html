<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Vector Drift</title>
  <meta name="description" content="Vector Drift terminal access node. Boot the shell, inspect the build, and trigger beta actions later.">
  <meta property="og:title" content="Vector Drift">
  <meta property="og:description" content="A cyan-phosphor terminal landing page for the Vector Drift beta.">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://vectordrift.io/">
  <meta property="og:image" content="https://vectordrift.io/icon.png">
  <link rel="icon" href="icon.png">
  <link rel="stylesheet" href="styles.css">
</head>
<body class="terminal-home">
  <div class="terminal-stage">
    <div class="terminal-window">
      <main class="terminal-screen" aria-label="Vector Drift system terminal">
        <div class="screen-glow"></div>
        <div class="screen-vignette"></div>
        <div class="screen-scanlines"></div>
        <div class="screen-noise"></div>

        <section class="terminal-content">
          <div class="terminal-header">
            <div id="terminal-status" class="terminal-status" aria-live="polite" hidden></div>

            <form id="terminal-form" class="terminal-form" autocomplete="off">
              <label class="sr-only" for="terminal-input">Terminal command input</label>
              <div class="prompt-line">
                <span class="prompt-prefix"></span>
                <div class="input-shell">
                  <input id="terminal-input" class="terminal-input" type="text" spellcheck="false" autocapitalize="off" autocomplete="off">
                  <span class="block-cursor" aria-hidden="true"></span>
                </div>
              </div>
            </form>
          </div>

          <div id="terminal-output" class="terminal-output" aria-live="polite"></div>
        </section>
      </main>
    </div>
  </div>

  <script src="terminal.js"></script>
</body>
</html>
